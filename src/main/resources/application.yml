server:
  port: 8080

spring:
  application:
    name: ai-agent-demo
  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      api-key: ${OPENAI_API_KEY:your-api-key}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
          temperature: 0.2

logging:
  level:
    com.example.aiagent: INFO
